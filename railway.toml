# Railway deployment config – Laravel
# https://docs.railway.app/reference/config-as-code

[build]
builder = "nixpacks"

[deploy]
startCommand = "php /app/artisan serve --host=0.0.0.0 --port=$PORT"
releaseCommand = "php /app/artisan migrate --force"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
