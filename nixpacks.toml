# Railway/Nixpacks Laravel - Production Ready
[variables]
    NIXPACKS_NODE_VERSION = "22"
    NIXPACKS_PHP_VERSION = "8.2"
    NPM_CONFIG_INCLUDE = "dev"
    APP_ENV = "production"
    APP_DEBUG = "false"

[phases.install]
    dependsOn = ["setup"]
    cmds = [
        "composer install --no-dev --optimize-autoloader --no-interaction",
        "npm install",
        "npm run build"
    ]

[phases.build]
    dependsOn = ["install"]
    cmds = [
        "php artisan optimize"
    ]

[deploy]
    # 'artisan serve' yerine varsayılan web sunucusunu kullanması için komutu sadeleştiriyoruz.
    # Migration ve seeding işlemini burada garantiliyoruz.
    startCommand = "php artisan migrate --force && php artisan db:seed --class=GamificationSeeder --force || true && php-fpm -D && nginx -g 'daemon off;'"
