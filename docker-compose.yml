services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tbd-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - tbd-network

  nginx:
    image: nginx:alpine
    container_name: tbd-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
    networks:
      - tbd-network

networks:
  tbd-network:
    driver: bridge
